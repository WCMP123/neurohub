<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>
// Minimal SignaturePad implementation (no external dependencies)
function SignaturePad(canvas, opts) {
  opts = opts || {};
  this.canvas = canvas;
  this.ctx = canvas.getContext('2d');
  this.penColor = opts.penColor || '#000';
  this.minWidth = opts.minWidth || 1;
  this.maxWidth = opts.maxWidth || 3;
  this._isEmpty = true;
  this._drawing = false;
  this._listeners = {};
  this._lastX = 0;
  this._lastY = 0;

  var self = this;

  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var ratio = window.devicePixelRatio || 1;
    var src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - r.left),
      y: (src.clientY - r.top)
    };
  }

  function onDown(e) {
    e.preventDefault();
    self._drawing = true;
    var p = getPos(e);
    self._lastX = p.x;
    self._lastY = p.y;
    self.ctx.beginPath();
    self.ctx.moveTo(p.x, p.y);
    self.ctx.strokeStyle = self.penColor;
    self.ctx.lineWidth = self.maxWidth;
    self.ctx.lineCap = 'round';
    self.ctx.lineJoin = 'round';
    self._isEmpty = false;
    self._fire('beginStroke');
  }

  function onMove(e) {
    e.preventDefault();
    if (!self._drawing) return;
    var p = getPos(e);
    self.ctx.lineTo(p.x, p.y);
    self.ctx.stroke();
    self.ctx.beginPath();
    self.ctx.moveTo(p.x, p.y);
    self._lastX = p.x;
    self._lastY = p.y;
  }

  function onUp(e) {
    e.preventDefault();
    self._drawing = false;
  }

  canvas.addEventListener('mousedown',  onDown, false);
  canvas.addEventListener('mousemove',  onMove, false);
  canvas.addEventListener('mouseup',    onUp,   false);
  canvas.addEventListener('mouseleave', onUp,   false);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove',  onMove, { passive: false });
  canvas.addEventListener('touchend',   onUp,   { passive: false });
}

SignaturePad.prototype.isEmpty = function() { return this._isEmpty; };
SignaturePad.prototype.clear = function() {
  this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
  this._isEmpty = true;
};
SignaturePad.prototype.addEventListener = function(type, fn) {
  if (!this._listeners[type]) this._listeners[type] = [];
  this._listeners[type].push(fn);
};
SignaturePad.prototype._fire = function(type) {
  var fns = this._listeners[type] || [];
  for (var i = 0; i < fns.length; i++) fns[i]();
};
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: white; font-family: Arial, sans-serif; padding: 8px; }
  .label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #1e3a4a; margin-bottom: 6px; }
  .pad-wrap { border: 2px dashed #c0d8e8; border-radius: 10px; background: #fff; height: 120px; position: relative; }
  canvas { display: block; border-radius: 10px; }
  .hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #bbb; font-size: 13px; pointer-events: none; }
  .clear { background: none; border: none; font-size: 11px; color: #888; text-decoration: underline; cursor: pointer; margin-top: 4px; padding: 0; font-family: inherit; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 400px) { .row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="row">
  <div>
    <div class="label">Patient Signature</div>
    <div class="pad-wrap" id="sw1">
      <canvas id="c1"></canvas>
      <div class="hint" id="h1">Sign here</div>
    </div>
    <button class="clear" onclick="clear1()">Clear</button>
  </div>
  <div>
    <div class="label">Witness <span style="font-weight:300;font-size:10px;">(if applicable)</span></div>
    <div class="pad-wrap" id="sw2">
      <canvas id="c2"></canvas>
      <div class="hint" id="h2">Sign here</div>
    </div>
    <button class="clear" onclick="clear2()">Clear</button>
  </div>
</div>

<script>
var p1, p2;

function init() {
  function make(canvasId, wrapId, hintId) {
    var wrap   = document.getElementById(wrapId);
    var canvas = document.getElementById(canvasId);
    var hint   = document.getElementById(hintId);
    var r = window.devicePixelRatio || 1;
    canvas.width  = wrap.clientWidth  * r;
    canvas.height = wrap.clientHeight * r;
    canvas.style.width  = wrap.clientWidth  + 'px';
    canvas.style.height = wrap.clientHeight + 'px';
    canvas.getContext('2d').scale(r, r);
    var pad = new SignaturePad(canvas, { penColor: '#1e3a4a', minWidth: 1.5, maxWidth: 3 });
    pad.addEventListener('beginStroke', function() { hint.style.display = 'none'; });
    return pad;
  }
  p1 = make('c1', 'sw1', 'h1');
  p2 = make('c2', 'sw2', 'h2');

  // Tell parent frame we're ready and report signatures on change
  pad_ready();
}

function pad_ready() {
  window.parent.postMessage({ type: 'pad_ready' }, '*');
}

function clear1() { p1.clear(); document.getElementById('h1').style.display = ''; }
function clear2() { p2.clear(); document.getElementById('h2').style.display = ''; }

// Allow parent to query signature status
window.addEventListener('message', function(e) {
  if (e.data === 'get_sigs') {
    window.parent.postMessage({
      type: 'sigs',
      patient: p1 && !p1.isEmpty() ? 'Yes — signed digitally' : 'Not signed',
      witness: p2 && !p2.isEmpty() ? 'Yes — signed digitally' : 'Not signed'
    }, '*');
  }
});

window.addEventListener('load', init);
</script>
</body>
</html>
