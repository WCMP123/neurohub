<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Signature Test</title>
<style>
  body { margin: 20px; font-family: sans-serif; }
  #pad {
    width: 100%;
    height: 200px;
    border: 3px solid #2878a0;
    border-radius: 8px;
    background: #f9f9f9;
    display: block;
    touch-action: none;
  }
  #status { margin-top: 10px; color: #333; font-size: 14px; }
  button { margin-top: 10px; padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>
<h2>Touch Test</h2>
<p>Try drawing on the box below:</p>
<canvas id="pad"></canvas>
<div id="status">Waiting for touch...</div>
<button onclick="clear()">Clear</button>

<script>
var canvas = document.getElementById('pad');
var ctx    = canvas.getContext('2d');
var status = document.getElementById('status');
var drawing = false;

// Size canvas to match CSS display size
function resize() {
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
  status.textContent = 'Canvas: ' + canvas.width + 'x' + canvas.height;
}
resize();
window.addEventListener('resize', resize);

function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  var src  = e.touches ? e.touches[0] : e;
  return {
    x: src.clientX - rect.left,
    y: src.clientY - rect.top
  };
}

canvas.addEventListener('mousedown', function(e) {
  drawing = true;
  var p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  status.textContent = 'Mouse down at ' + Math.round(p.x) + ',' + Math.round(p.y);
});

canvas.addEventListener('mousemove', function(e) {
  if (!drawing) return;
  var p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
});

canvas.addEventListener('mouseup',    function() { drawing = false; });
canvas.addEventListener('mouseleave', function() { drawing = false; });

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  drawing = true;
  var p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.strokeStyle = '#e00';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  status.textContent = 'Touch at ' + Math.round(p.x) + ',' + Math.round(p.y);
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!drawing) return;
  var p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  status.textContent = 'Drawing at ' + Math.round(p.x) + ',' + Math.round(p.y);
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  drawing = false;
  status.textContent = 'Touch ended';
}, { passive: false });

function clear() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  status.textContent = 'Cleared';
}
</script>
</body>
</html>
